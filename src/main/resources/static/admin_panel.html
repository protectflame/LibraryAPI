<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibraryAPI — Админ Панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
        .tab-btn.active { border-bottom: 3px solid rgb(16 185 129); color: rgb(16 185 129); }
        .author-tag { background-color: rgb(245 158 11); color: black; font-size: 0.8rem; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
<div class="max-w-7xl mx-auto p-6">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-4xl font-bold flex items-center gap-3">
                <i class="fas fa-book text-emerald-500"></i> LibraryAPI
            </h1>
            <p class="text-gray-400">Админ-панель • localhost:8080</p>
        </div>
        <button onclick="window.location.reload()" class="px-5 py-2.5 bg-gray-800 hover:bg-gray-700 rounded-2xl flex items-center gap-2">
            <i class="fas fa-sync"></i> Обновить
        </button>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-gray-700 mb-8 overflow-x-auto">
        <button onclick="switchTab(0)" class="tab-btn active px-8 py-4 font-medium text-lg">Книги</button>
        <button onclick="switchTab(1)" class="tab-btn px-8 py-4 font-medium text-lg">Авторы</button>
        <button onclick="switchTab(2)" class="tab-btn px-8 py-4 font-medium text-lg">Читатели</button>
        <button onclick="switchTab(3)" class="tab-btn px-8 py-4 font-medium text-lg">Выдачи</button>
        <button onclick="switchTab(4)" class="tab-btn px-8 py-4 font-medium text-lg">Raw JSON</button>
    </div>

    <!-- ===================== КНИГИ ===================== -->
    <div id="tab-0" class="tab-content">
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <!-- Создать книгу -->
            <div class="card bg-gray-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-5">Создать книгу</h2>
                <form id="bookForm">
                    <input type="text" id="title" placeholder="Название" required class="w-full mb-3 px-4 py-3 bg-gray-800 rounded-2xl">
                    <input type="text" id="genre" placeholder="Жанр" required class="w-full mb-3 px-4 py-3 bg-gray-800 rounded-2xl">
                    <input type="text" id="isbn" placeholder="ISBN" required class="w-full mb-3 px-4 py-3 bg-gray-800 rounded-2xl">
                    <input type="text" id="description" placeholder="Описание" class="w-full mb-3 px-4 py-3 bg-gray-800 rounded-2xl">
                    <input type="number" id="totalCopies" value="5" min="1" class="w-full mb-4 px-4 py-3 bg-gray-800 rounded-2xl">

                    <label class="block text-sm text-gray-400 mb-2">Авторы</label>
                    <select id="authorsSelect" multiple class="w-full bg-gray-800 rounded-2xl p-3 h-40 mb-4"></select>

                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3.5 rounded-2xl font-medium">Создать</button>
                </form>
            </div>

            <!-- Удалить книгу -->
            <div class="card bg-gray-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-5 text-red-400">Удалить книгу</h2>
                <form id="bookDeleteForm">
                    <input type="number" id="deleteBookId" placeholder="ID книги" required class="w-full mb-4 px-4 py-3 bg-gray-800 rounded-2xl">
                    <button type="submit" class="w-full bg-red-600 hover:bg-red-500 py-3.5 rounded-2xl font-medium">Удалить</button>
                </form>
            </div>

            <!-- Список книг -->
            <div class="card bg-gray-900 rounded-3xl p-6 xl:col-span-3">
                <div class="flex justify-between mb-5">
                    <h2 class="text-xl font-semibold">Все книги</h2>
                    <button onclick="loadBooks()" class="text-emerald-400 hover:text-emerald-300"><i class="fas fa-refresh"></i></button>
                </div>
                <div id="booksList" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[620px] overflow-auto"></div>
            </div>
        </div>
    </div>

    <!-- ===================== АВТОРЫ ===================== -->
    <div id="tab-1" class="tab-content hidden">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card bg-gray-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-5">Новый автор</h2>
                <form id="authorForm">
                    <input type="text" id="authorName" placeholder="ФИО автора" required class="w-full mb-4 px-4 py-3 bg-gray-800 rounded-2xl">
                    <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 py-3.5 rounded-2xl font-medium">Добавить автора</button>
                </form>
            </div>

            <div class="card bg-gray-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-5">Список авторов</h2>
                <div id="authorsList" class="space-y-3 max-h-[620px] overflow-auto"></div>
            </div>
        </div>
    </div>

    <!-- ===================== ЧИТАТЕЛИ ===================== -->
    <div id="tab-2" class="tab-content hidden">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card bg-gray-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-5">Новый читатель</h2>
                <form id="readerForm">
                    <input type="text" id="readerName" placeholder="ФИО" required class="w-full mb-3 px-4 py-3 bg-gray-800 rounded-2xl">
                    <input type="email" id="readerEmail" placeholder="Email" class="w-full mb-4 px-4 py-3 bg-gray-800 rounded-2xl">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3.5 rounded-2xl font-medium">Добавить</button>
                </form>
            </div>

            <div class="card bg-gray-900 rounded-3xl p-6">
                <h2 class="text-xl font-semibold mb-5">Список читателей</h2>
                <div id="readersList" class="space-y-3 max-h-[620px] overflow-auto"></div>
            </div>
        </div>
    </div>

    <!-- ===================== RAW JSON ===================== -->
    <div id="tab-4" class="tab-content hidden">
        <div class="bg-gray-900 rounded-3xl p-6">
            <div class="flex justify-between mb-3">
                <h2 class="text-xl font-semibold">Raw JSON</h2>
                <button onclick="clearJson()" class="text-gray-400 hover:text-white"><i class="fas fa-trash"></i></button>
            </div>
            <textarea id="rawJson" class="w-full h-96 bg-gray-950 p-5 rounded-2xl font-mono text-sm" readonly></textarea>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "http://localhost:8080/api/v1";

    function switchTab(n) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById(`tab-${n}`).classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach((el, i) => el.classList.toggle('active', i === n));
    }

    async function apiRequest(url, options = {}) {
        try {
            const res = await fetch(url, options);
            const text = await res.text();
            let data;
            try { data = JSON.parse(text); } catch { data = text; }

            document.getElementById('rawJson').value = JSON.stringify(data, null, 2);

            if (!res.ok) throw new Error(data?.message || `HTTP ${res.status}`);
            return data;
        } catch (err) {
            alert("Ошибка: " + err.message);
            console.error(err);
        }
    }

    // ===================== АВТОРЫ =====================
    async function loadAuthors() {
        const data = await apiRequest(`${BASE_URL}/authors?page=0&size=100&sort=name,asc`);
        const authors = data?.content || [];

        document.getElementById('authorsList').innerHTML = authors.map(a => `
            <div class="bg-gray-800 p-4 rounded-2xl flex justify-between items-center">
                <strong>${a.name}</strong>
                <span class="text-gray-500 text-sm">ID: ${a.id}</span>
            </div>
        `).join('') || '<p class="text-gray-400">Нет авторов</p>';

        // Для формы книг
        document.getElementById('authorsSelect').innerHTML = authors.map(a =>
            `<option value="${a.id}">${a.name}</option>`
        ).join('');
    }

    document.getElementById('authorForm').addEventListener('submit', async e => {
        e.preventDefault();
        const author = { name: document.getElementById('authorName').value };

        await apiRequest(`${BASE_URL}/authors`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(author)
        });
        e.target.reset();
        loadAuthors();
    });

    // ===================== КНИГИ =====================
    async function loadBooks() {
        const data = await apiRequest(`${BASE_URL}/books?page=0&size=20&sort=title,asc`);
        const books = data?.content || [];

        const html = books.map(book => `
            <div class="bg-gray-800 p-5 rounded-2xl">
                <div class="flex justify-between">
                    <div>
                        <strong class="text-lg">${book.title}</strong>
                        <div class="text-sm text-gray-400">${book.isbn} • ${book.genre}</div>
                    </div>
                    <span class="text-emerald-400">${book.availableCopies || 0}/${book.totalCopies}</span>
                </div>
                ${book.authors?.length ? `
                <div class="flex flex-wrap gap-2 mt-3">
                    ${book.authors.map(a => `<span class="author-tag px-3 py-1 rounded-xl">${a.name}</span>`).join('')}
                </div>` : ''}
            </div>
        `).join('');

        document.getElementById('booksList').innerHTML = html || '<p class="text-gray-400">Книги отсутствуют</p>';
    }

    document.getElementById('bookForm').addEventListener('submit', async e => {
        e.preventDefault();
        const selectedAuthors = Array.from(document.getElementById('authorsSelect').selectedOptions)
            .map(opt => ({ id: +opt.value }));

        const book = {
            title: document.getElementById('title').value,
            genre: document.getElementById('genre').value,
            isbn: document.getElementById('isbn').value,
            description: document.getElementById('description').value,
            totalCopies: +document.getElementById('totalCopies').value,
            authors: selectedAuthors
        };

        await apiRequest(`${BASE_URL}/books`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(book)
        });
        loadBooks();
        e.target.reset();
    });

    document.getElementById('bookDeleteForm').addEventListener('submit', async e => {
        e.preventDefault();
        const id = document.getElementById('deleteBookId').value;
        if (!id) return;

        if (confirm(`Удалить книгу ID = ${id}?`)) {
            await apiRequest(`${BASE_URL}/books?id=${id}`, { method: 'DELETE' });
            loadBooks();
            e.target.reset();
        }
    });

    // ===================== ЧИТАТЕЛИ =====================
    document.getElementById('readerForm').addEventListener('submit', async e => {
        e.preventDefault();
        const reader = {
            name: document.getElementById('readerName').value,
            email: document.getElementById('readerEmail').value || null
        };

        await apiRequest(`${BASE_URL}/readers`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(reader)
        });
        loadReaders();
        e.target.reset();
    });

    async function loadReaders() {
        const data = await apiRequest(`${BASE_URL}/readers`);
        const html = (data || []).map(r => `
            <div class="bg-gray-800 p-4 rounded-2xl flex justify-between">
                <div><strong>${r.name}</strong><br><span class="text-gray-400">${r.email || ''}</span></div>
                <span class="text-gray-500">ID: ${r.id}</span>
            </div>
        `).join('');
        document.getElementById('readersList').innerHTML = html || '<p class="text-gray-400">Нет читателей</p>';
    }

    function clearJson() {
        document.getElementById('rawJson').value = '';
    }

    // Инициализация
    window.onload = () => {
        switchTab(0);
        loadBooks();
        loadAuthors();
        loadReaders();
    };
</script>
</body>
</html>
